<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorAI Engine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: #0b0c10; color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background-color: #111218; display: flex; flex-direction: column; position: relative; }
        header { padding: 18px; background-color: #161822; border-bottom: 1px solid #222533; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; }
        .logo span { color: #0084ff; }
        
        /* Quick Feature Pills from your physical sketch */
        .pill-wrapper { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background-color: #111218; border-bottom: 1px solid #1a1c26; }
        .feature-pill { background-color: #1c1e29; border: 1px solid #282b3d; color: #a0aec0; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; white-space: nowrap; cursor: pointer; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 1rem; line-height: 1.5; word-wrap: break-word; white-space: pre-line; }
        .bubble.ai { background-color: #1c1e29; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #282b3d; }
        .bubble.user { background-color: #0084ff; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .input-area { padding: 16px; background-color: #161822; border-top: 1px solid #222533; display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background-color: #1f2231; border: 1px solid #2d3147; border-radius: 28px; padding: 14px 20px; color: #ffffff; outline: none; font-size: 1rem; }
        .send-btn { background-color: #0084ff; border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">Vector<span>AI</span></div>
        </header>

        <div class="pill-wrapper">
            <button class="feature-pill" onclick="injectPill('Help me write an optimized code block for ')">Code</button>
            <button class="feature-pill" onclick="injectPill('Write a highly engaging essay about ')">Write</button>
            <button class="feature-pill" onclick="injectPill('Give me 5 unique project roadmap ideas regarding ')">Projects</button>
            <button class="feature-pill" onclick="injectPill('Analyze historical trends inside sports science of ')">Sports</button>
        </div>

        <div class="chat-messages" id="chat-viewport">
            <div class="bubble ai">How can I assist you today? Ask me anything.</div>
        </div>

        <div class="input-area">
            <input type="text" class="chat-input" id="user-input" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') streamDataRequest()">
            <button class="send-btn" onclick="streamDataRequest()">➔</button>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function injectPill(textPrefix) {
            const input = document.getElementById('user-input');
            input.value = textPrefix;
            input.focus();
        }

        async function streamDataRequest() {
            const inputElement = document.getElementById('user-input');
            const text = inputElement.value.trim();
            if (!text) return;

            const viewport = document.getElementById('chat-viewport');

            const userBubble = document.createElement('div');
            userBubble.className = 'bubble user';
            userBubble.innerText = text;
            viewport.appendChild(userBubble);
            inputElement.value = '';

            chatHistory.push({ role: "student", text: text });
            viewport.scrollTop = viewport.scrollHeight;

            const aiBubble = document.createElement('div');
            aiBubble.className = 'bubble ai';
            aiBubble.innerText = "•"; 
            viewport.appendChild(aiBubble);
            viewport.scrollTop = viewport.scrollHeight;

            try {
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory })
                });

                if (!response.body) {
                    aiBubble.innerText = "Fatal stream response error.";
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                aiBubble.innerText = ""; 

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunkText = decoder.decode(value, { stream: true });
                    aiBubble.innerText += chunkText;
                    viewport.scrollTop = viewport.scrollHeight;
                }

                chatHistory.push({ role: "ai", text: aiBubble.innerText });

            } catch (err) {
                aiBubble.innerText = "Local stream dropped. Check Pydroid console log.";
            }
        }
    </script>
</body>
</html>
