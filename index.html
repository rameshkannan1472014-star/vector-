<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorAI System Console</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
        header { background-color: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #30363d; font-size: 1.1rem; font-weight: bold; color: #58a6ff; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word; font-size: 0.95rem; }
        .user { background-color: #1f6feb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background-color: #161b22; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #30363d; white-space: pre-wrap; }
        #input-area { background-color: #161b22; padding: 15px; border-top: 1px solid #30363d; display: flex; gap: 10px; }
        #msg-input { flex: 1; background-color: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 12px 20px; color: #c9d1d9; font-size: 1rem; outline: none; }
        #msg-input:focus { border-color: #58a6ff; }
        #send-btn { background-color: #1f6feb; color: #ffffff; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s; }
        #send-btn:hover { background-color: #388bfd; }
        #send-btn:disabled { background-color: #30363d; cursor: not-allowed; }
        .typing { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <header>VectorAI System Console</header>

    <div id="chat-container">
        <div class="message bot">System active. Enter transmission.</div>
    </div>

    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Ask anything..." autocomplete="off">
        <button id="send-btn">→</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            msgInput.disabled = isLoading;
            sendBtn.textContent = isLoading ? '...' : '→';
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            msgInput.value = '';
            setLoading(true);

            const botMessageDiv = appendMessage('▍', 'bot typing');

            try {
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    botMessageDiv.textContent = `Server Connection Failure (${response.status})`;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    fullText += decoder.decode(value, { stream: true });
                    botMessageDiv.textContent = fullText + '▍';
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                // Remove cursor when done
                botMessageDiv.textContent = fullText;
                botMessageDiv.className = 'message bot';

            } catch (err) {
                botMessageDiv.textContent = `Connection error: ${err.message}`;
                botMessageDiv.className = 'message bot';
            } finally {
                setLoading(false);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) sendMessage();
        });
    </script>
</body>
</html>
